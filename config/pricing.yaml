# LLM Pricing Config
# All prices are in USD per 1 Million tokens
# Update these whenever OpenAI changes their pricing

models:
  gpt-4o:
    encoding: o200k_base
    input: 2.50
    output: 10.00
    context_window: 128000

  gpt-4o-mini:
    encoding: o200k_base
    input: 0.15
    output: 0.60
    context_window: 128000

  gpt-4-turbo:
    encoding: cl100k_base
    input: 10.00
    output: 30.00
    context_window: 128000

  gpt-4:
    encoding: cl100k_base
    input: 30.00
    output: 60.00
    context_window: 8192

  gpt-3.5-turbo:
    encoding: cl100k_base
    input: 0.50
    output: 1.50
    context_window: 16385
